name: Run code tests on push and pull requests
on:
  push:
  pull_request:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  tests:
    name: Code tests (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
        matrix:
            os: ["ubuntu-latest"]
            python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: true
      - uses: conda-incubator/setup-miniconda@v3
        with:
          mamba-version: "*"
          python-version: ${{ matrix.python-version }}
          activate-environment: test
          environment-file: .github/requirements.yml
          auto-activate-base: false
          channels: conda-forge
      - shell: bash -l {0}
        run: |
          conda info
          conda list
      - name: Lint
        shell: bash -l {0}
        run: |
            python -m flake8 src --exclude src/nifti_mrs/standard
      - name: Run pytest
        shell: bash -l {0}
        run: |
            pip install .
            pytest -k "not with_fsl_mrs" tests
      - uses: conda-incubator/setup-miniconda@v3
        with:
          mamba-version: "*"
          python-version: ${{ matrix.python-version }}
          activate-environment: fsl_mrs
          environment-file: .github/requirements_fslmrs.yml
          auto-activate-base: false
          channels: conda-forge, https://fsl.fmrib.ox.ac.uk/fsldownloads/fslconda/public/
      - name: Run pytest with fsl_mrs
        shell: bash -l {0}
        run: |
            conda info
            conda list
            pip install .
            pytest -k "with_fsl_mrs" tests

